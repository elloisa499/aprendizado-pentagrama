<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura Musical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .card-3d-wrapper { transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @media (hover: hover) and (pointer: fine) {
            .card-3d-wrapper:hover { transform: rotateX(8deg) rotateY(-8deg) scale(1.05); }
        }
        @keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.8) rotate(-15deg); color: #ef4444; } 100% { transform: scale(1); } }
        .heart-anim { animation: heartPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .float-anim { animation: floating 2.5s ease-in-out infinite; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div id="app"></div>

    <script>
        // Dados e Lógica do App integrados
        const NOTES_DATA = [
            { id: 1, name: 'Dó Central', clef: 'sol', y: 120, ledger: true, color: 'text-red-500', bg: 'bg-red-100', freq: 261.63, description: 'O Dó central é o rei do meio! Ele precisa de uma linha extra só para ele.' },
            { id: 2, name: 'Ré', clef: 'sol', y: 110, ledger: false, color: 'text-orange-500', bg: 'bg-orange-100', freq: 293.66, description: 'O Ré fica logo abaixo da primeira linha.' },
            { id: 3, name: 'Mi', clef: 'sol', y: 100, ledger: false, color: 'text-amber-500', bg: 'bg-amber-100', freq: 329.63, description: 'O Mi adora se equilibrar na primeira linha!' },
            { id: 4, name: 'Fá', clef: 'sol', y: 90, ledger: false, color: 'text-green-500', bg: 'bg-green-100', freq: 349.23, description: 'O Fá descansa no primeiro espaço.' },
            { id: 5, name: 'Sol', clef: 'sol', y: 80, ledger: false, color: 'text-blue-500', bg: 'bg-blue-100', freq: 392.00, description: 'A Clave de Sol mora na segunda linha!' },
            { id: 6, name: 'Lá', clef: 'sol', y: 70, ledger: false, color: 'text-indigo-500', bg: 'bg-indigo-100', freq: 440.00, description: 'O Lá adora pular no segundo espaço.' },
            { id: 7, name: 'Si', clef: 'sol', y: 60, ledger: false, color: 'text-purple-500', bg: 'bg-purple-100', freq: 493.88, description: 'O Si mora na terceira linha.' },
            { id: 8, name: 'Dó Agudo', clef: 'sol', y: 50, ledger: false, color: 'text-pink-500', bg: 'bg-pink-100', freq: 523.25, description: 'Um som fininho no terceiro espaço!' },
            { id: 9, name: 'Dó (Grave)', clef: 'fa', y: 70, ledger: false, color: 'text-teal-500', bg: 'bg-teal-100', freq: 130.81, description: 'Som de urso gigante na clave de Fá.' },
            { id: 10, name: 'Fá', clef: 'fa', y: 40, ledger: false, color: 'text-cyan-600', bg: 'bg-cyan-100', freq: 174.61, description: 'Fá na quarta linha!' },
            { id: 11, name: 'Sol (Grave)', clef: 'fa', y: 30, ledger: false, color: 'text-emerald-500', bg: 'bg-emerald-100', freq: 196.00, description: 'Sol no quarto espaço.' }
        ];

        function playTone(freq) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
            osc.start(); osc.stop(ctx.currentTime + 1.5);
        }

        // Renderização simples do app
        document.getElementById('app').innerHTML = `
            <div class="p-6 text-center">
                <h1 class="text-3xl font-bold mb-4 text-purple-600">Aventura Musical</h1>
                <p class="mb-8">Bem-vindo à nossa escola de música! Escolha uma nota para aprender.</p>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    ${NOTES_DATA.map(n => `
                        <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 cursor-pointer hover:scale-105 transition" onclick="playTone(${n.freq})">
                            <h2 class="text-xl font-bold ${n.color}">${n.name}</h2>
                            <p class="text-sm text-slate-500 mt-2">${n.description}</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    </script>
</body>
</html>
